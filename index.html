<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Atendimento</title>

<style>

body{
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    /* Fundo cinza bem claro, comum no site do Sem Parar */
    background: #f8f9fa; 
    color: #333;
    text-align: center;
}

.container{
    padding: 40px 20px;
}

.logo{
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 10px;
    /* Azul institucional do Sem Parar */
    color: #001689; 
}

.sub{
    /* Cinza escuro para o subtítulo */
    color: #666; 
    margin-bottom: 40px;
}

.card{
    /* Cards brancos com sombra suave para destaque */
    background: #ffffff;
    margin: 15px auto;
    padding: 25px 20px;
    border-radius: 16px;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    /* Detalhe em Magenta no topo para reforçar a marca */
    border-top: 5px solid #D60B52; 
}

.card h3{
    margin-top: 0;
    /* Títulos dos cards em azul */
    color: #001689; 
}

.card p {
    color: #555;
    font-size: 14px;
}

.btn{
    display: block;
    /* Magenta oficial do Sem Parar */
    background: #D60B52; 
    color: white;
    text-decoration: none;
    padding: 14px;
    border-radius: 30px; /* Bordas arredondadas como nos botões do site */
    margin-top: 15px;
    font-weight: bold;
    transition: background 0.3s ease, transform 0.2s ease;
}

.btn:hover{
    background: #b50945; /* Tom mais escuro no hover */
    transform: translateY(-2px);
}

</style>
</head>

<body>

<div class="container">

<div class="logo">SUPORTE AO CLIENTE SEM PARAR</div>
<div class="sub">Escolha uma opção de atendimento</div>

<div class="card">
    <h3>TAG COM PROBLEMA</h3>
    <p>Fale com um atendente agora</p>
    <a class="btn" href="https://wa.me/5511999999999">Abrir WhatsApp</a>
</div>

<div class="card">
    <h3>CANCELAMENTO</h3>
    <p>Internet lenta ou sem conexão</p>
    <a class="btn" href="https://wa.me/5511999999999">Solicitar Suporte</a>
</div>

<div class="card">
    <h3>OUTROS ASSUNTOSr</h3>
    <p>Atualização de boletos e faturas</p>
    <a class="btn" href="https://wa.me/5511999999999">Falar com Atendente</a>
</div>

</div>

</body>
</html>
